# =============
# System Configuration
# =============

# ===== LLM Configuration =====
llm:
  # Agent 1: GPT-5.2 + text-embedding-3-large
  agent1:
    provider: "openai"
    model: "openai/gpt-5.2"
    api_key: "${OPENAI_API_KEY}"  
    base_url: "https://openrouter.ai/api/v1"
    temperature: 0.5
    max_tokens: 2000
    embedding_model: "openai/text-embedding-3-large"
    emb_url: "https://openrouter.ai/api/v1/embeddings"
    embedding_provider: "openrouter"
  
  # Agent 2: DeepSeek V3.2 + voyage-3-large
  agent2:
    provider: "deepseek"
    model: "deepseek/deepseek-v3.2"
    api_key: "${DEEPSEEK_API_KEY}"  
    base_url: "https://openrouter.ai/api/v1"
    temperature: 1.0
    max_tokens: 2000
    embedding_model: "voyage-3-large"    
    voyage_api_key: "${VOYAGE_API_KEY}"
    embedding_provider: "voyage" 
  
  # Agent 3: Gemini 3.0 Pro Preview + gemini-embedding-001
  agent3:
    provider: "google"
    model: "google/gemini-3-pro-preview"
    api_key: "${GOOGLE_API_KEY}"  
    base_url: "https://openrouter.ai/api/v1"
    temperature: 1.0
    max_tokens: 2000
    embedding_model: "google/gemini-embedding-001"
    emb_url: "https://openrouter.ai/api/v1/embeddings"
    embedding_provider: "openrouter"
  
  # Agent 4: Qwen3-Max-Thinking + text-embedding-v4
  agent4:
    # Chat model via OpenRouter 
    provider: "openai"
    model: "qwen/qwen3-max-thinking"
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"
    temperature: 1.0
    max_tokens: 2000
    # Embeddings still via DashScope compatible-mode 
    embedding_api_key: "${QWEN_API_KEY}"
    embedding_model: "text-embedding-v4" 
    emb_url: "https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings"
    embedding_provider: "bailian" 

# ===== Vector Store Configuration =====
vector_store:
  type: "chroma"
  persist_directory: "./data/chroma_db"
  collection_name: "electrochemistry_literature"
  distance_metric: "cosine"  # 'cosine, l2, ip'
  
# ===== RAG System Configuration =====
rag:
  chunk_size: 256  
  chunk_overlap: 50  
  top_k: 5  
  similarity_threshold: 0.8  
  
# ===== Debate Configuration =====
debate:
  max_rounds: 3  
  review_timeout: 600    
  rebuttal_timeout: 600  
  propose_timeout: 600
  timeout: 600  # Fallback 

  # Stalemate resolution: if max_rounds is reached and >1 proposal remains active,
  # deterministically pick a winner (no extra LLM calls) and produce a single final claim.
  resolve_stalemate: true
  stalemate_method: "score"  # currently supported: "score"
  stalemate_percent_tolerance: 0.05  # absolute tolerance when matching "X(12.34%)" floats
  stalemate_range_strategy: "conservative"  # conservative | mean

  # Auto-withdraw agents that repeatedly timeout / emit invalid JSON to avoid dragging the wall-clock.
  auto_withdraw_on_call_errors: true
  auto_withdraw_call_error_threshold: 2
  auto_withdraw_call_error_types: ["timeout", "invalid_json"]
  auto_withdraw_status: "withdrawn"

  # ReAct step budgets per phase 
  propose_max_react_steps: 5
  review_max_react_steps: 3
  rebuttal_max_react_steps: 4

  # LangGraph-style debate parameters 
  no_response_threshold: 1  # consecutive rounds failing to rebut valid reviews => defeated
  max_reviews_per_target: 2  # per reviewer per target proposal per round

# ===== QA Integration Configuration =====
qa:
  workflow_mode: "react_reviewed"
  save_output: true
  outputs_dir: "./outputs"
  artifact_subdir: "qa_artifacts"
  enable_peer_review: true
  model_timeout_seconds: 45
  progress_log_every_claims: 10
  peer_review:
    max_claims_for_llm_review: 40
    max_second_round_claims: 15
    disable_llm_review_when_abstract_only: true
    fallback_mode: "deterministic_only"

  entity_resolution:
    seed_file: "./qa/resources/entity_seeds.yaml"
    emit_seed_suggestions: true
    pubchem_enabled: true
    pubchem_entity_types: ["molecule", "solvent", "reagent", "ligand", "substrate"]
    max_pubchem_candidates: 5
    mention_extraction_min_confidence: 0.7
    llm_disambiguation_enabled: true
    disambiguation_min_confidence: 0.7
    fail_open_on_provider_error: true

  react_reviewed:
    max_propose_steps_initial: 6
    max_propose_steps_revision: 4
    proposer_fallback_mode: "fail_fast_only"
    proposer_repair_attempts: 1
    proposer_evidence_policy: "prefer_fulltext"
    max_review_cycles: 3
    reviewer_max_steps: 3
    reviewer_max_concurrency: 4
    reviewer_max_retrieval_actions: 1
    reviewer_retrieval_budget_by_role:
      search_coverage: 1
      evidence_trace: 0
      reasoning_consistency: 0
      counterevidence: 2
    max_review_items_per_reviewer: 3
    max_review_items_per_step_section: 1
    stop_on_no_blocking_items: true
    require_all_reviewers: true
    review_call_retry_limit: 1
    review_failure_blocks_acceptance: true

  pdf_extraction:
    enabled: true
    primary_backend: "pymupdf"
    secondary_backend: "docling"
    ocr_backend: "ocrmypdf"
    enable_ocr_fallback: true
    min_total_chars: 800
    min_chars_per_text_page: 80
    min_text_page_ratio: 0.5
    min_printable_ratio: 0.95
    snippet_target_chars: 1000
    snippet_overlap_chars: 120
    preserve_page_blocks: true
    max_ocr_pages: 40
    ocr_timeout_seconds: 300
    skip_ocr_when_text_already_usable: true

  models:
    # mode:ledger
    router: "agent1"
    entity_resolver: "agent1"
    query_planner: "agent1"
    evidence_extractor: "agent1"
    claim_miner: "agent1"
    methodology_reviewer: "agent1"
    citation_reviewer: "agent1"
    contradiction_reviewer: "agent1"
    claim_revision: "agent1"
    review_merge: "agent1"
    synthesizer: "agent1"

    # mode:react_reviewer
    react_proposer: "agent1"
    react_reviewer_search_coverage: "agent1"
    react_reviewer_evidence_trace: "agent1"
    react_reviewer_reasoning_consistency: "agent1"
    react_reviewer_counterevidence: "agent1"
    
  providers:
    
    openalex_mailto: "${OPENALEX_MAILTO}"
    crossref_mailto: "${CROSSREF_MAILTO}"

    semantic_scholar_api_key: "${SEMANTIC_SCHOLAR_API_KEY}"
    unpaywall_email: "${UNPAYWALL_EMAIL}"

    # Transport timeouts in seconds.
    http_timeout: 10.0
    fetch_timeout: 15.0

    # Retry policy for transient provider/network failures.
    retry_attempts: 2
    backoff_base_seconds: 1.0
    backoff_max_seconds: 8.0
  
# ===== Experience Store Configuration =====
experience:
  storage_path: "./data/experience_db.json"
  packs_path: "./experience"
  max_experiences: 1000  
  relevance_threshold: 0.4  
  enable_experience_reuse: true  
  guideline_top_k: 3
  always_include_guidelines: true
  guideline_search_mode: "keyword"
  
# ===== Chemistry Configuration =====
chemistry:
  num_components: 5  # Number of components
  num_reaction_types: 9  # Number of reaction types
  reaction_types:
    - "CO2RR"  # CO2 Reduction Reaction
    - "EOR"    # Ethanol Oxidation Reaction
    - "HER"    # Hydrogen Evolution Reaction
    - "HOR"    # Hydrogen Oxidation Reaction
    - "HZOR"   # Hydrazine Oxidation Reaction
    - "O5H"    # Oxidation of 5-hydroxymethylfurfural
    - "OER"    # Oxygen Evolution Reaction
    - "ORR"    # Oxygen Reduction Reaction
    - "UOR"    # Urea Oxidation Reaction
    
# ===== Logging Configuration =====
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_file: "./logs/system.log"
  run_dir: "./logs/runs"   # per-run logs: ./logs/runs/<run_id>/run.log, events.jsonl, etc.
  log_format: "%(asctime)s | %(levelname)s | %(name)s | run=%(run_id)s | %(message)s"
  max_file_size: 20971520  # 20MB
  backup_count: 5
  
# ===== Paths Configuration =====
paths:
  raw_data: "./data/raw"
  outputs: "./outputs"
