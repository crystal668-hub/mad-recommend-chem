# =============
# ChemQA Configuration
# =============

llm:
  agent1:
    provider: "openai"
    model: "openai/gpt-5.2"
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"
    temperature: 0.5
    max_tokens: 2000
    embedding_model: "openai/text-embedding-3-large"
    emb_url: "https://openrouter.ai/api/v1/embeddings"
    embedding_provider: "openrouter"

  agent2:
    provider: "deepseek"
    model: "deepseek/deepseek-v3.2"
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"
    temperature: 0.5
    max_tokens: 2000
    embedding_model: "voyage-3-large"
    voyage_api_key: "${VOYAGE_API_KEY}"
    embedding_provider: "voyage"

  agent3:
    provider: "google"
    model: "google/gemini-3-pro-preview"
    api_key: "${GOOGLE_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"
    temperature: 0.5
    max_tokens: 2000
    embedding_model: "google/gemini-embedding-001"
    emb_url: "https://openrouter.ai/api/v1/embeddings"
    embedding_provider: "openrouter"

  agent4:
    provider: "openai"
    model: "qwen/qwen3-max-thinking"
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://openrouter.ai/api/v1"
    temperature: 0.5
    max_tokens: 2000
    embedding_api_key: "${QWEN_API_KEY}"
    embedding_model: "text-embedding-v4"
    emb_url: "https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings"
    embedding_provider: "bailian"

qa:
  workflow_mode: "react_reviewed"
  save_output: true
  outputs_dir: "./outputs"
  artifact_subdir: "qa_artifacts"
  enable_peer_review: true
  model_timeout_seconds: 45
  progress_log_every_claims: 10

  peer_review:
    max_claims_for_llm_review: 40
    max_second_round_claims: 15
    disable_llm_review_when_abstract_only: true
    fallback_mode: "fail_fast_only"

  entity_resolution:
    seed_file: "./qa/resources/entity_seeds.yaml"
    emit_seed_suggestions: true
    pubchem_enabled: true
    pubchem_entity_types: ["molecule", "solvent", "reagent", "ligand", "substrate"]
    max_pubchem_candidates: 5
    mention_extraction_min_confidence: 0.7
    llm_disambiguation_enabled: true
    disambiguation_min_confidence: 0.7
    fail_open_on_provider_error: true

  react_reviewed:
    max_propose_steps_initial: 10
    max_propose_steps_revision: 10
    proposer_fallback_mode: "fail_fast_only"
    proposer_repair_attempts: 1
    proposer_evidence_policy: "prefer_fulltext"
    grobid_url: "http://localhost:8070"
    grobid_preflight_enabled: true
    grobid_startup_enabled: true
    grobid_startup_script: "./scripts/grobid-up.sh"
    grobid_startup_timeout_seconds: 180.0
    grobid_startup_wait_timeout_seconds: 120.0
    grobid_startup_poll_interval_seconds: 2.0
    proposer_candidate_target: 10
    proposer_rerank_top_k: 5
    expose_candidate_submission_when_rejected: true

    stage_watchdog_seconds: 120.0
    max_review_cycles: 3

    reviewer_max_steps: 3
    reviewer_max_concurrency: 4
    reviewer_max_retrieval_actions: 1
    reviewer_retrieval_budget_by_role:
      search_coverage: 1
      evidence_trace: 0
      reasoning_consistency: 0
      counterevidence: 2

    max_review_items_per_reviewer: 3
    max_review_items_per_step_section: 1
    stop_on_no_blocking_items: true
    require_all_reviewers: true
    review_call_retry_limit: 1
    review_failure_blocks_acceptance: true

  pdf_extraction:
    enabled: true
    primary_backend: "pymupdf"
    secondary_backend: "none"
    min_total_chars: 800
    min_chars_per_text_page: 80
    min_text_page_ratio: 0.5
    min_printable_ratio: 0.95
    snippet_target_chars: 1000
    snippet_overlap_chars: 120
    preserve_page_blocks: true

  models:
    router: "agent2"
    entity_resolver: "agent2"
    query_planner: "agent2"
    evidence_extractor: "agent2"
    claim_miner: "agent2"
    methodology_reviewer: "agent2"
    citation_reviewer: "agent2"
    contradiction_reviewer: "agent2"
    claim_revision: "agent2"
    review_merge: "agent2"
    synthesizer: "agent2"
    react_proposer: "agent2"
    react_reviewer_search_coverage: "agent2"
    react_reviewer_evidence_trace: "agent2"
    react_reviewer_reasoning_consistency: "agent2"
    react_reviewer_counterevidence: "agent2"

  providers:
    openalex_mailto: "${OPENALEX_MAILTO}"
    crossref_mailto: "${CROSSREF_MAILTO}"
    semantic_scholar_api_key: "${SEMANTIC_SCHOLAR_API_KEY}"
    unpaywall_email: "${UNPAYWALL_EMAIL}"
    http_timeout: 10.0
    fetch_timeout: 15.0
    document_fetch_timeout_seconds: 45.0
    document_fetch_total_timeout_seconds: 300.0
    provider_redirect_limit: 8
    retry_attempts: 2
    backoff_base_seconds: 1.0
    backoff_max_seconds: 8.0

logging:
  level: "INFO"
  log_file: "./logs/system.log"
  run_dir: "./logs/runs"
  log_format: "%(asctime)s | %(levelname)s | %(name)s | run=%(run_id)s | %(message)s"
  max_file_size: 20971520
  backup_count: 5

paths:
  outputs: "./outputs"
