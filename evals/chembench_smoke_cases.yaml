cases:
  - subset: analytical_chemistry
    name: analytical_chemistry_27
    uuid: 4ada53cc-d365-90a2-3a90-890d8c350229
    question: >-
      Physical adsorption of gases is used to evaluate textural properties and microporosity of
      solid materials, such as \ce{N2} adsorption isotherms at \pu{-196 deg C} and \ce{CO2}
      adsorption isotherms at \pu{0 deg C}. \ce{CO2} adsorption isotherms are usually used to
      evaluate narrow microporosity (pore width < \pu{0.7 nm}). If the critical dimensions of both
      molecules are similar, why can the \ce{CO2} experiments extend the range of analysis to the
      narrow microporosity?
    gold: >-
      Because the higher temperature of the \ce{CO2} isotherms avoids kinetic restrictions to access
      to smaller micropores
    type: choice_text
    keywords:
      - \ce{CO2} isotherms
      - narrow microporosity
      - kinetic restrictions
      - requires-reasoning
      - difficulty-advanced
    source_url: https://huggingface.co/datasets/jablonkagroup/ChemBench/viewer/analytical_chemistry/train

  - subset: analytical_chemistry
    name: analytical_chemistry_28
    uuid: 01ce9f8b-f8db-a555-b9c6-796928bc3762
    question: >-
      A \ce{Ni} 2p XPS spectrum shows two peaks corresponding to \ce{Ni} 2p$_{3/2}$ and
      \ce{Ni} 2p$_{1/2}$ at \pu{854.6 eV} and \pu{871.1 eV}, respectively, and two peaks
      corresponding to \ce{Ni} 2p$_{3/2}$ and \ce{Ni} 2p$_{1/2}$ at \pu{856.3 eV} and
      \pu{873.6 eV}, respectively. These peaks indicate the presence of nickel as \ce{Ni^{2+}} in
      the analyzed sample. However, two additional peaks are detected at \pu{861.8 eV} and
      \pu{879.1 eV}, respectively. Which of the following options explains what these two peaks at
      higher binding energies represent?
    gold: >-
      The additional peaks can be shake-up satellite peaks where the photoemitted electron leaves
      behind an excited state of the atom
    type: choice_text
    keywords:
      - XPS
      - shake-up satellite peaks
      - binding energies
      - requires-reasoning
      - difficulty-advanced
    source_url: https://huggingface.co/datasets/jablonkagroup/ChemBench/viewer/analytical_chemistry/train

  - subset: materials_science
    name: solid_state_chemistry_4
    uuid: b74b76e4-0a13-c358-b54e-55fe92f21503
    question: >-
      A materials scientist is analyzing an unknown metallic sample using X-ray diffraction (XRD)
      with a \ce{Cu} $K_{\alpha}$ source ($\lambda$=\pu{1.54 A}). The diffraction pattern shows the
      following peaks (given as \pu{2 \theta} values): \pu{31.7 deg}, \pu{36.8 deg},
      \pu{45.5 deg}, \pu{54.7 deg}, \pu{65.9 deg}, \pu{73.7 deg}, \pu{77.2 deg}, \pu{82.3 deg},
      \pu{85.7 deg}, \pu{94.1 deg}. After careful analysis, the scientist suspects the sample might
      be a mixture of two phases. Based on this information and the given XRD data, which of the
      following conclusions is MOST likely correct?
    gold: >-
      The sample contains a mixture of FCC and BCC phases, but the data is insufficient to
      definitively identify the BCC phase.
    type: choice_text
    keywords:
      - XRD
      - mixture of FCC and BCC phases
      - insufficient to definitively identify the BCC phase
      - requires-reasoning
      - requires-knowledge
    source_url: https://huggingface.co/datasets/jablonkagroup/ChemBench/viewer/materials_science/train
