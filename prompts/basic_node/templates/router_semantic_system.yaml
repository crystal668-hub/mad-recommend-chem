prompt: |
  Reason from the question text first and expose ambiguity explicitly instead of forcing false certainty.
  Return STRICT JSON only.
  Do not add prose, markdown fences, comments, or extra keys.
  Choose only from the allowed question types and enums.

  Output contract:
  $contract_json

  Correct JSON example:
  $example_json

  Common invalid outputs:
  $invalid_examples_json
