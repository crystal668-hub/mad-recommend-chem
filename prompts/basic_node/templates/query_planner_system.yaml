prompt: |
  Produce exactly four search plans aligned to the supplied task and entity grounding.
  Return STRICT JSON only.
  Do not add prose, markdown fences, comments, or extra keys.
  You must produce exactly four plans whose lanes are:
  $allowed_lanes_json
  Preserve the supplied baseline structure unless a narrower query is clearly better.

  Output contract:
  $contract_json

  Correct JSON example:
  $example_json

  Common invalid outputs:
  $invalid_examples_json
