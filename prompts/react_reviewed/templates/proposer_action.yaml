prompt: |
  CURRENT PHASE: ACTION
  You must call tools instead of answering in free text.
  Allowed tools: $tool_names.
  Treat these as retrieval/inspection tools: $retrieval_tools.
  Call plan_queries before any search.
  Call plan_queries once, then reuse the returned query plans instead of re-planning in extra steps.
  Prefer a single batched search_papers call with multiple query_plan_ids when you need coverage across several planned searches.
  After search_papers returns PDF-backed candidates, prefer one batched download_document call with paper_ids covering all searched candidates before screen_papers.
  Proposer candidate target: $proposer_candidate_target cumulative strict-PDF candidates within the current cycle.
  For proposer retrieval, search_papers is Semantic Scholar-only.
  Treat a candidate as downloadable only when Semantic Scholar `openAccessPdf.url` exists, the paper has a DOI, and the normalized URL ends with `.pdf`; reject `/pdf`, `_pdf`, landing pages, and query/fragment pseudo-PDF URLs.
  Default proposer budget: spend one search_papers step and one download_document step before screen_papers; do not keep broad discovery open by default.
  The proposer candidate target is a cycle-level cumulative threshold, not a single-search minimum and not a success requirement.
  If the cycle ends below the proposer candidate target, continue with the currently accumulated candidates through download/screen/parse/extract; missing the target does not by itself make retrieval fail.
  Call screen_papers only after the requested candidate papers have already been downloaded in this cycle.
  Call download_document with `paper_ids` whenever you need to fetch multiple searched papers in one step; it will use Unpaywall `best_oa_location.url_for_pdf` first and retry once with Semantic Scholar `openAccessPdf.url` if needed.
  Use screen_papers to build clipped GROBID XML profiles from the downloaded PDFs and rerank the downloaded candidates listwise before parse_document and evidence extraction.
  Call download_document only for papers returned by search_papers in this cycle.
  If screen_papers returns `screen_status=input_exhausted` with `failure_domain=pdf_input`, you may run at most one more batched search_papers plus one more batched download_document in this cycle; otherwise stop expanding retrieval and move to parse/extract/closeout.
  Call parse_document only for papers locked by screen_papers.
  Call parse_document with `paper_ids` when several locked papers should be parsed in parallel within one step.
  Call read_sections with `paper_ids` only for broad multi-paper follow-up using default/preferred sections; keep `section_ids` empty in that case.
  Call extract_evidence only for papers locked by screen_papers.
  Call extract_evidence with `paper_ids` when several locked papers should be processed in parallel within one step; keep `section_ids` empty when batching.
  Call extract_evidence before conclude. Prefer fulltext-backed evidence when it exists.
  Do not mix retrieval tools with conclude in the same step.
  $runtime_guidance_block

  For conclude:
  - $tool_call_rule
  - Use conclude only when the submission object is ready.
  - The final step must call the conclude tool with the completed submission payload.

  Correct conclude example:
  $tool_call_example_json

  Common invalid outputs:
  $invalid_examples_json
